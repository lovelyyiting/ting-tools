<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車種 BOM 維護</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 10px; }
        .container { max-width: 1250px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; position: relative; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .back-link { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: white; text-decoration: none; font-size: 14px; background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 16px; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; padding: 14px 20px; border-bottom: 1px solid #eee; align-items: center; }
        .import-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 15px; cursor: pointer; }
        .btn-sub { border: 1px solid #ccc; background: white; padding: 9px 15px; border-radius: 8px; font-size: 13px; cursor: pointer; color: #555; }
        .clear-btn { border: 1px solid #f0a0a0; background: #fff5f5; color: #c00; padding: 9px 15px; border-radius: 8px; font-size: 13px; cursor: pointer; }
        .meta { font-size: 12px; color: #888; margin-left: auto; }
        .layout { display: flex; min-height: 60vh; }
        .sidebar { width: 220px; border-right: 1px solid #eee; overflow-y: auto; max-height: 70vh; flex-shrink: 0; }
        .model-item { padding: 11px 16px; border-bottom: 1px solid #f2f2f2; cursor: pointer; font-size: 14px; }
        .model-item:hover { background: #f7f8fc; }
        .model-item.active { background: #eef2ff; border-left: 4px solid #667eea; font-weight: bold; }
        .model-item .cnt { font-size: 12px; color: #999; }
        .content { flex: 1; padding: 14px 18px; overflow-x: auto; }
        .model-head { font-size: 17px; font-weight: bold; color: #445; margin-bottom: 4px; }
        .model-sub { font-size: 13px; color: #888; margin-bottom: 10px; }
        .search { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
        table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
        table.data th { background: #f5f6fa; padding: 7px 8px; text-align: left; color: #555; position: sticky; top: 0; white-space: nowrap; }
        table.data td { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; }
        .empty-hint { text-align: center; color: #999; padding: 50px 10px; font-size: 15px; }
        .note { font-size: 12px; color: #999; margin: 12px 20px; line-height: 1.7; }
        .lv { display: inline-block; min-width: 20px; text-align: center; background: #eef; border-radius: 4px; padding: 1px 5px; font-size: 12px; color: #558; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a class="back-link" href="index.html">← 首頁</a>
            <h1>🚲 車種 BOM 維護</h1>
            <p>依車種維護 BOM，Excel 一鍵整批覆蓋更新，供遠期缺料邏輯使用</p>
        </div>

        <div class="toolbar">
            <button class="import-btn" onclick="document.getElementById('bomFile').click()">📥 匯入 Excel（整批覆蓋）</button>
            <button class="btn-sub" onclick="downloadTpl()">⬇️ 範本說明</button>
            <button class="clear-btn" onclick="clearAll()">🗑️ 清空</button>
            <input type="file" id="bomFile" accept=".xlsx,.xls" style="display:none" onchange="importBom(this.files[0]); this.value='';">
            <span class="meta" id="meta"></span>
        </div>

        <div class="note">
            匯入格式：一份 Excel，含一張「彙整表」分頁（車種、料號）＋每個車種各一張分頁（分頁名＝車種）。
            車種分頁需含欄位：層次、物件 ID（料號）、物件說明、元件數量、元件計量單位、物料類型。匯入會整批取代舊資料。
        </div>

        <div class="layout">
            <div class="sidebar" id="sidebar"></div>
            <div class="content" id="content"><div class="empty-hint">尚無資料，請「📥 匯入 Excel」</div></div>
        </div>
    </div>

    <script src="common.js?v=20260706a"></script>
    <script>
        const BOM_PATH = 'toolbox/bom';
        // data = { updatedAt, models: [ { name, part, rows:[{level,item,mat,desc,qty,unit,type}] } ] }
        // 用陣列存，因車種名可能含「.」不能當 Firebase key
        let data = { updatedAt: '', models: [] };
        let currentModel = null;   // 車種名
        function modelList() { return Array.isArray(data.models) ? data.models : Object.entries(data.models||{}).map(([name, v]) => ({ name, ...v })); }
        function findModel(name) { return modelList().find(m => m.name === name); }

        const COMP_ALIAS = {
            level:['層次','階層','層級'],
            item:['項目號碼','項次','項目'],
            mat:['物件 ID','物件ID','料號','元件料號','物料','子件料號','元件'],
            desc:['物件說明','品名','說明','物料說明'],
            qty:['元件數量〈CUn〉','元件數量','用量','數量','組成用量'],
            unit:['元件計量單位','單位','計量單位'],
            type:['物料類型','類型','物料型態']
        };
        const SUM_ALIAS = { model:['車種','車型','機種'], part:['料號','成品料號','物料'] };

        function initData() {
            const cached = JSON.parse(localStorage.getItem('bomData') || 'null');
            if (cached) data = normalize(cached);
            render();
            if (db) db.ref(BOM_PATH).on('value', s => {
                const v = s.val();
                if (v) { data = normalize(v); localStorage.setItem('bomData', JSON.stringify(data)); render(); }
            });
        }
        function normalize(v) {
            let models = v.models;
            if (!Array.isArray(models)) models = Object.entries(models || {}).map(([name, m]) => ({ name, ...m }));
            models = models.filter(Boolean).map(m => ({ name: m.name, part: m.part || '', rows: Array.isArray(m.rows) ? m.rows : Object.values(m.rows || {}) }));
            return { updatedAt: v.updatedAt || '', models };
        }

        function readWorkbook(file, cb) {
            const reader = new FileReader();
            reader.onload = e => { try { cb(null, XLSX.read(new Uint8Array(e.target.result), { type:'array', cellDates:false })); } catch(err){ cb(err); } };
            reader.onerror = () => cb(new Error('讀檔失敗'));
            reader.readAsArrayBuffer(file);
        }

        function mapAoa(aoa, alias) {
            if (!aoa.length) return { rows: [], matched: [] };
            let bestRow = 0, bestScore = -1;
            for (let i = 0; i < Math.min(aoa.length, 6); i++) {
                const cells = (aoa[i]||[]).map(x => String(x).trim());
                let score = 0; Object.values(alias).forEach(al => { if (cells.some(c => al.includes(c))) score++; });
                if (score > bestScore) { bestScore = score; bestRow = i; }
            }
            const header = (aoa[bestRow]||[]).map(x => String(x).trim());
            const colIdx = {};
            Object.entries(alias).forEach(([f, al]) => { const idx = header.findIndex(h => al.includes(h)); if (idx >= 0) colIdx[f] = idx; });
            const rows = [];
            for (let i = bestRow + 1; i < aoa.length; i++) {
                const r = aoa[i]; if (!r || r.every(c => String(c).trim() === '')) continue;
                const obj = {}; Object.entries(colIdx).forEach(([f, idx]) => { obj[f] = r[idx]; }); rows.push(obj);
            }
            return { rows, matched: Object.keys(colIdx), headerRow: bestRow };
        }
        function aoaOf(wb, name) { return XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: '' }); }

        function importBom(file) {
            if (!file) return;
            readWorkbook(file, (err, wb) => {
                if (err) { alert('讀取失敗：' + err.message); return; }
                // 彙整表：車種→料號
                const sumName = wb.SheetNames.find(n => n.includes('彙整') || n.includes('彙總') || n.includes('總表'));
                const partOf = {};
                if (sumName) {
                    const sm = mapAoa(aoaOf(wb, sumName), SUM_ALIAS);
                    sm.rows.forEach(r => { const m = String(r.model||'').trim(); if (m) partOf[m] = String(r.part||'').trim(); });
                }
                // 其餘每張分頁 = 一個車種
                const models = [];
                let totalRows = 0;
                wb.SheetNames.forEach(n => {
                    if (n === sumName) return;
                    const res = mapAoa(aoaOf(wb, n), COMP_ALIAS);
                    if (!res.matched.includes('mat')) return; // 沒有料號欄的分頁略過
                    const rows = res.rows.map(r => ({
                        level: r.level ?? '', item: String(r.item ?? '').trim(),
                        mat: String(r.mat ?? '').trim(), desc: String(r.desc ?? '').trim(),
                        qty: r.qty === '' || r.qty == null ? '' : num(r.qty),
                        unit: String(r.unit ?? '').trim(), type: String(r.type ?? '').trim()
                    })).filter(r => r.mat);
                    if (!rows.length) return;
                    const key = n.trim();
                    models.push({ name: key, part: partOf[key] || partOf[n] || '', rows });
                    totalRows += rows.length;
                });
                const modelCount = models.length;
                if (!modelCount) { alert('沒有讀到任何車種 BOM。\n請確認每個車種分頁含「物件 ID／料號」欄位。'); return; }
                if (!confirm(`讀到 ${modelCount} 個車種、共 ${totalRows} 筆元件。\n將【整批覆蓋】現有 BOM，確定匯入？`)) return;
                data = { updatedAt: new Date().toLocaleString('zh-TW'), models };
                localStorage.setItem('bomData', JSON.stringify(data));
                if (db) db.ref(BOM_PATH).set(data);
                currentModel = models[0].name;
                render();
                alert(`已匯入 ${modelCount} 個車種、${totalRows} 筆元件`);
            });
        }

        function clearAll() {
            if (!confirm('確定清空所有車種 BOM？')) return;
            data = { updatedAt: new Date().toLocaleString('zh-TW'), models: [] };
            localStorage.setItem('bomData', JSON.stringify(data));
            if (db) db.ref(BOM_PATH).set(data);
            currentModel = null; render();
        }

        function downloadTpl() {
            alert('匯入格式說明：\n\n1) 一張「彙整表」分頁：欄位含 車種、料號\n2) 每個車種各一張分頁，分頁名稱＝車種名\n   欄位含：層次、物件 ID、物件說明、元件數量、元件計量單位、物料類型\n\n（可直接用你 SAP 匯出的「各車種BOM」檔匯入）');
        }

        function selectModel(m) { currentModel = m; render(); }

        function render() {
            const models = modelList();
            const names = models.map(m => m.name);
            const totalRows = models.reduce((s, m) => s + (m.rows||[]).length, 0);
            document.getElementById('meta').textContent =
                names.length ? `${names.length} 個車種・${totalRows} 筆元件` + (data.updatedAt ? `・更新於 ${data.updatedAt}` : '') : '';

            // 側欄
            document.getElementById('sidebar').innerHTML = models.map(m =>
                `<div class="model-item ${m.name === currentModel ? 'active' : ''}" onclick="selectModel('${m.name.replace(/'/g,"\\'")}')">
                    ${esc(m.name)}<br><span class="cnt">${(m.rows||[]).length} 筆</span></div>`).join('');

            const content = document.getElementById('content');
            if (!names.length) { content.innerHTML = '<div class="empty-hint">尚無資料，請「📥 匯入 Excel」</div>'; return; }
            if (!currentModel || !findModel(currentModel)) currentModel = names[0];
            const md = findModel(currentModel);
            const kw = (document.getElementById('bomSearch')?.value || '').trim().toLowerCase();
            let rows = md.rows || [];
            if (kw) rows = rows.filter(r => (r.mat + r.desc).toLowerCase().includes(kw));
            content.innerHTML =
                `<div class="model-head">${esc(currentModel)}</div>
                 <div class="model-sub">成品料號：${esc(md.part || '（未對應）')}　・　${(md.rows||[]).length} 筆元件</div>
                 <input class="search" id="bomSearch" placeholder="🔍 篩選料號或品名" value="${esc(kw)}" oninput="render()">
                 <table class="data"><tr><th>層次</th><th>項目</th><th>料號</th><th>品名</th><th>用量</th><th>單位</th><th>類型</th></tr>` +
                rows.slice(0, 500).map(r => `<tr>
                    <td><span class="lv">${esc(r.level)}</span></td><td>${esc(r.item)}</td>
                    <td>${esc(r.mat)}</td><td>${esc(r.desc)}</td><td>${esc(r.qty)}</td>
                    <td>${esc(r.unit)}</td><td>${esc(r.type)}</td></tr>`).join('') +
                (rows.length > 500 ? `<tr><td colspan="7" style="color:#999">…其餘 ${rows.length-500} 筆（用搜尋縮小範圍）</td></tr>` : '') +
                '</table>';
            // 保持搜尋游標
            const sb = document.getElementById('bomSearch');
            if (kw && sb) { sb.focus(); sb.setSelectionRange(sb.value.length, sb.value.length); }
        }

        initData();
    </script>
</body>
</html>
