<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物料資料管理</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #8c9a76 0%, #6e7a58 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #8c9a76 0%, #6e7a58 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .header h1 { font-size: 26px; margin-bottom: 5px; }
        .header p { font-size: 13px; opacity: 0.9; }

        .back-link {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 16px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #eee;
            overflow-x: auto;
        }

        .tab {
            flex: 1;
            padding: 14px 10px;
            text-align: center;
            font-size: 15px;
            cursor: pointer;
            color: #666;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
        }

        .tab.active {
            color: #7a8663;
            font-weight: bold;
            border-bottom-color: #7a8663;
        }

        .panel { padding: 16px 20px 30px; }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .import-btn {
            background: linear-gradient(135deg, #8c9a76 0%, #6e7a58 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        .tpl-btn, .clear-btn {
            border: 1px solid #ccc;
            background: white;
            padding: 9px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: #555;
        }

        .meta {
            font-size: 13px;
            color: #888;
            margin-left: auto;
        }

        .search {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        table.data {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        table.data th {
            background: #f5f6fa;
            padding: 8px;
            text-align: left;
            color: #555;
            position: sticky;
            top: 0;
        }

        table.data td {
            padding: 7px 8px;
            border-bottom: 1px solid #f0f0f0;
        }

        .table-wrap {
            max-height: 55vh;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        .empty-hint {
            text-align: center;
            color: #999;
            padding: 40px 10px;
            font-size: 15px;
        }

        .note {
            font-size: 13px;
            color: #999;
            margin-top: 10px;
            line-height: 1.6;
        }
        /* 車種BOM 分頁 */
        .bom-layout { display: flex; min-height: 55vh; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .bom-sidebar { width: 200px; border-right: 1px solid #eee; overflow-y: auto; max-height: 62vh; flex-shrink: 0; }
        .bom-model { padding: 10px 14px; border-bottom: 1px solid #f2f2f2; cursor: pointer; font-size: 14px; }
        .bom-model:hover { background: #f7f8fc; }
        .bom-model.active { background: #eef2ff; border-left: 4px solid #7a8663; font-weight: bold; }
        .bom-model .cnt { font-size: 12px; color: #999; }
        .bom-content { flex: 1; padding: 12px 14px; overflow-x: auto; }
        .bom-head { font-size: 16px; font-weight: bold; color: #445; }
        .bom-sub { font-size: 13px; color: #888; margin-bottom: 10px; }
        .lv { display: inline-block; min-width: 20px; text-align: center; background: #eef; border-radius: 4px; padding: 1px 5px; font-size: 12px; color: #558; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css?v=20260706b">
</head>
<body>
    <div class="container">
        <div class="header">
            <a class="back-link" href="index.html">← 首頁</a>
            <h1>📦 物料資料管理</h1>
            <p>基本交期・在途交期・BOM・庫存・車種BOM，每天用 Excel 一鍵更新</p>
        </div>

        <div class="tabs" id="tabs"></div>

        <div class="panel" id="stdPanel">
            <div class="actions">
                <button class="import-btn" onclick="document.getElementById('fileInput').click()">📥 匯入 Excel（整批覆蓋）</button>
                <button class="tpl-btn" onclick="downloadTpl()">⬇️ 下載範本</button>
                <button class="clear-btn" onclick="clearData()">🗑️ 清空</button>
                <span class="meta" id="meta"></span>
            </div>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="importFile(this.files[0]); this.value='';">
            <input type="text" class="search" id="searchBox" placeholder="🔍 輸入料號或品名篩選" oninput="renderTable()">
            <div class="table-wrap">
                <table class="data" id="dataTable"></table>
            </div>
            <div class="note" id="note"></div>
        </div>

        <!-- 車種BOM 分頁 -->
        <div class="panel" id="bomPanel" style="display:none">
            <div class="actions">
                <button class="import-btn" onclick="document.getElementById('bomFile').click()">📥 匯入車種BOM（整批覆蓋）</button>
                <button class="tpl-btn" onclick="bomTplInfo()">⬇️ 格式說明</button>
                <button class="clear-btn" onclick="clearBom()">🗑️ 清空</button>
                <span class="meta" id="bomMeta"></span>
            </div>
            <input type="file" id="bomFile" accept=".xlsx,.xls" style="display:none" onchange="importBom(this.files[0]); this.value='';">
            <div class="bom-layout">
                <div class="bom-sidebar" id="bomSidebar"></div>
                <div class="bom-content" id="bomContent"><div class="empty-hint">尚無車種BOM，點「📥 匯入車種BOM」</div></div>
            </div>
            <div class="note">匯入格式：一份 Excel，含一張「彙整表」分頁（車種、料號）＋每個車種各一張分頁（分頁名＝車種），車種分頁含 層次／物件 ID（料號）／物件說明／元件數量／單位／物料類型。可直接匯入 SAP 匯出的「各車種BOM」檔。</div>
        </div>
    </div>

    <script src="common.js?v=20260706b"></script>
    <script>
        // 四種資料集的定義：路徑、範本欄位、解析與顯示方式
        const DATASETS = {
            leadtime: {
                title: '基本交期',
                path: 'toolbox/materials/leadtime',
                headers: ['料號', '品名', '基本交期(天)'],
                example: ['RM-0001', '外殼原料', 14],
                cols: [['mat','料號'], ['name','品名'], ['days','基本交期(天)']],
                note: '每個料號的採購前置時間（工作天）。缺料分析會用它推算「現在下單最快何時到貨」。',
                parse(rows, map) {
                    return rows.map(r => ({
                        mat: String(cell(r, map, 'mat')).trim(),
                        name: String(cell(r, map, 'name')).trim(),
                        days: num(cell(r, map, 'ltDays'))
                    })).filter(r => r.mat);
                }
            },
            incoming: {
                title: '在途交期（實際）',
                path: 'toolbox/materials/incoming',
                headers: ['料號', '數量', '交期', '採購單號'],
                example: ['RM-0001', 500, '2026-07-15', 'PO-12345'],
                cols: [['mat','料號'], ['qty','數量'], ['date','交期'], ['po','採購單號']],
                note: '已下單、尚未入庫的採購明細與實際交期。同一料號可以有多筆。交期已過但還沒入庫的，缺料分析會標紅色警訊。',
                parse(rows, map) {
                    return rows.map(r => ({
                        mat: String(cell(r, map, 'mat')).trim(),
                        qty: num(cell(r, map, 'qty')),
                        date: parseDateCell(cell(r, map, 'dueDate')),
                        po: String(cell(r, map, 'po')).trim()
                    })).filter(r => r.mat && r.qty > 0);
                }
            },
            inventory: {
                title: '庫存',
                path: 'toolbox/materials/inventory',
                headers: ['料號', '品名', '庫存數量'],
                example: ['RM-0001', '外殼原料', 1200],
                cols: [['mat','料號'], ['name','品名'], ['qty','庫存數量']],
                note: '目前各料號的可用庫存。缺料分析會依排程順序逐張工單扣抵。',
                parse(rows, map) {
                    return rows.map(r => ({
                        mat: String(cell(r, map, 'mat')).trim(),
                        name: String(cell(r, map, 'name')).trim(),
                        qty: num(cell(r, map, 'stock') !== '' ? cell(r, map, 'stock') : cell(r, map, 'qty'))
                    })).filter(r => r.mat);
                }
            }
        };

        let currentKey = 'leadtime';
        const cache = {};  // key → {updatedAt, rows}

        function initTabs() {
            document.getElementById('tabs').innerHTML = Object.entries(DATASETS).map(([k, d]) =>
                `<div class="tab ${k === currentKey ? 'active' : ''}" data-key="${k}" onclick="switchTab('${k}')">${d.title}</div>`
            ).join('') + `<div class="tab" data-key="bommodel" onclick="switchTab('bommodel')">車種BOM</div>`;
        }

        function switchTab(k) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === k));
            const isBom = k === 'bommodel';
            document.getElementById('stdPanel').style.display = isBom ? 'none' : '';
            document.getElementById('bomPanel').style.display = isBom ? '' : 'none';
            if (isBom) { renderBom(); return; }
            currentKey = k;
            document.getElementById('searchBox').value = '';
            renderTable();
        }

        function initData() {
            Object.entries(DATASETS).forEach(([k, d]) => {
                cache[k] = JSON.parse(localStorage.getItem('mat_' + k) || '{"rows":[]}');
                if (db) {
                    db.ref(d.path).on('value', snap => {
                        cache[k] = snap.val() || { rows: [] };
                        if (!Array.isArray(cache[k].rows)) cache[k].rows = Object.values(cache[k].rows || {});
                        localStorage.setItem('mat_' + k, JSON.stringify(cache[k]));
                        if (k === currentKey) renderTable();
                    });
                }
            });
            renderTable();
        }

        function importFile(file) {
            if (!file) return;
            const d = DATASETS[currentKey];
            readExcelFile(file, (err, rows) => {
                if (err) { alert('讀取 Excel 失敗：' + err.message); return; }
                if (!rows.length) { alert('檔案裡沒有資料'); return; }
                const map = buildHeaderMap(rows[0]);
                const parsed = d.parse(rows, map);
                if (!parsed.length) {
                    alert('找不到可匯入的資料。\n請確認標題列包含：' + d.headers.join('、') + '\n（可先按「下載範本」比對格式）');
                    return;
                }
                const skipped = rows.length - parsed.length;
                if (!confirm(`即將以 ${parsed.length} 筆資料【整批覆蓋】現有的「${d.title}」` +
                    (skipped > 0 ? `\n（有 ${skipped} 筆因缺少必要欄位被略過）` : '') + '\n\n確定匯入？')) return;
                const data = { updatedAt: new Date().toLocaleString('zh-TW'), rows: parsed };
                cache[currentKey] = data;
                localStorage.setItem('mat_' + currentKey, JSON.stringify(data));
                if (db) db.ref(d.path).set(data);
                renderTable();
                alert(`「${d.title}」已更新：${parsed.length} 筆`);
            });
        }

        function clearData() {
            const d = DATASETS[currentKey];
            if (!confirm(`確定清空「${d.title}」全部資料？`)) return;
            const data = { updatedAt: new Date().toLocaleString('zh-TW'), rows: [] };
            cache[currentKey] = data;
            localStorage.setItem('mat_' + currentKey, JSON.stringify(data));
            if (db) db.ref(d.path).set(data);
            renderTable();
        }

        function downloadTpl() {
            const d = DATASETS[currentKey];
            downloadTemplate(d.title + '_匯入範本.xlsx', d.headers, d.example);
        }

        function renderTable() {
            const d = DATASETS[currentKey];
            const data = cache[currentKey] || { rows: [] };
            const kw = document.getElementById('searchBox').value.trim().toLowerCase();
            let rows = data.rows || [];
            if (kw) rows = rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(kw)));

            document.getElementById('meta').textContent =
                `共 ${(data.rows || []).length} 筆` + (data.updatedAt ? `・最後更新：${data.updatedAt}` : '');
            document.getElementById('note').textContent = '💡 ' + d.note;

            const table = document.getElementById('dataTable');
            if (!rows.length) {
                table.innerHTML = `<tr><td><div class="empty-hint">尚無資料，點「📥 匯入 Excel」開始</div></td></tr>`;
                return;
            }
            const shown = rows.slice(0, 300);
            table.innerHTML =
                '<tr>' + d.cols.map(c => `<th>${c[1]}</th>`).join('') + '</tr>' +
                shown.map(r => '<tr>' + d.cols.map(c => `<td>${esc(r[c[0]])}</td>`).join('') + '</tr>').join('') +
                (rows.length > 300 ? `<tr><td colspan="${d.cols.length}" style="color:#999">…其餘 ${rows.length - 300} 筆（可用上方搜尋縮小範圍）</td></tr>` : '');
        }

        // ===== 車種BOM（整合分頁）=====
        const BOM_PATH = 'toolbox/bom';
        let bomData = { updatedAt: '', models: [] };
        let currentModel = null;
        const COMP_ALIAS = {
            level:['層次','階層','層級'],
            item:['項目號碼','項次','項目'],
            mat:['物件 ID','物件ID','料號','元件料號','物料','子件料號','元件'],
            desc:['物件說明','品名','說明','物料說明'],
            qty:['元件數量〈CUn〉','元件數量','用量','數量','組成用量'],
            unit:['元件計量單位','單位','計量單位'],
            type:['物料類型','類型','物料型態']
        };
        const SUM_ALIAS = { model:['車種','車型','機種'], part:['料號','成品料號','物料'] };
        function bomModels() { return Array.isArray(bomData.models) ? bomData.models : Object.entries(bomData.models||{}).map(([name,v])=>({name,...v})); }
        function findModel(n) { return bomModels().find(m => m.name === n); }
        function normalizeBom(v) {
            let models = v.models;
            if (!Array.isArray(models)) models = Object.entries(models||{}).map(([name,m])=>({name,...m}));
            models = models.filter(Boolean).map(m => ({ name: m.name, part: m.part||'', rows: Array.isArray(m.rows)?m.rows:Object.values(m.rows||{}) }));
            return { updatedAt: v.updatedAt||'', models };
        }
        function initBom() {
            const c = JSON.parse(localStorage.getItem('bomData') || 'null');
            if (c) bomData = normalizeBom(c);
            if (db) db.ref(BOM_PATH).on('value', s => {
                const v = s.val();
                if (v) { bomData = normalizeBom(v); localStorage.setItem('bomData', JSON.stringify(bomData)); if (document.getElementById('bomPanel').style.display !== 'none') renderBom(); }
            });
        }
        function bomReadWb(file, cb) {
            const r = new FileReader();
            r.onload = e => { try { cb(null, XLSX.read(new Uint8Array(e.target.result), { type:'array', cellDates:false })); } catch(err){ cb(err); } };
            r.onerror = () => cb(new Error('讀檔失敗')); r.readAsArrayBuffer(file);
        }
        function bomMapAoa(aoa, alias) {
            if (!aoa.length) return { rows: [], matched: [] };
            let bestRow = 0, bestScore = -1;
            for (let i = 0; i < Math.min(aoa.length, 6); i++) {
                const cells = (aoa[i]||[]).map(x => String(x).trim());
                let score = 0; Object.values(alias).forEach(al => { if (cells.some(c => al.includes(c))) score++; });
                if (score > bestScore) { bestScore = score; bestRow = i; }
            }
            const header = (aoa[bestRow]||[]).map(x => String(x).trim());
            const colIdx = {};
            Object.entries(alias).forEach(([f, al]) => { const idx = header.findIndex(h => al.includes(h)); if (idx>=0) colIdx[f]=idx; });
            const rows = [];
            for (let i = bestRow+1; i < aoa.length; i++) {
                const r = aoa[i]; if (!r || r.every(c => String(c).trim()==='')) continue;
                const o = {}; Object.entries(colIdx).forEach(([f,idx])=>{ o[f]=r[idx]; }); rows.push(o);
            }
            return { rows, matched: Object.keys(colIdx) };
        }
        function bomAoa(wb, name) { return XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: '' }); }
        function importBom(file) {
            if (!file) return;
            bomReadWb(file, (err, wb) => {
                if (err) { alert('讀取失敗：' + err.message); return; }
                const sumName = wb.SheetNames.find(n => n.includes('彙整') || n.includes('彙總') || n.includes('總表'));
                const partOf = {};
                if (sumName) bomMapAoa(bomAoa(wb, sumName), SUM_ALIAS).rows.forEach(r => { const m=String(r.model||'').trim(); if(m) partOf[m]=String(r.part||'').trim(); });
                const models = []; let totalRows = 0;
                wb.SheetNames.forEach(n => {
                    if (n === sumName) return;
                    const res = bomMapAoa(bomAoa(wb, n), COMP_ALIAS);
                    if (!res.matched.includes('mat')) return;
                    const rows = res.rows.map(r => ({
                        level: r.level ?? '', item: String(r.item ?? '').trim(),
                        mat: String(r.mat ?? '').trim(), desc: String(r.desc ?? '').trim(),
                        qty: r.qty === '' || r.qty == null ? '' : num(r.qty),
                        unit: String(r.unit ?? '').trim(), type: String(r.type ?? '').trim()
                    })).filter(r => r.mat);
                    if (!rows.length) return;
                    const key = n.trim();
                    models.push({ name: key, part: partOf[key] || partOf[n] || '', rows });
                    totalRows += rows.length;
                });
                if (!models.length) { alert('沒有讀到任何車種 BOM。請確認每個車種分頁含「物件 ID／料號」欄位。'); return; }
                if (!confirm(`讀到 ${models.length} 個車種、共 ${totalRows} 筆元件。\n將【整批覆蓋】現有車種BOM，確定？`)) return;
                bomData = { updatedAt: new Date().toLocaleString('zh-TW'), models };
                localStorage.setItem('bomData', JSON.stringify(bomData));
                if (db) db.ref(BOM_PATH).set(bomData);
                currentModel = models[0].name; renderBom();
                alert(`已匯入 ${models.length} 個車種、${totalRows} 筆元件`);
            });
        }
        function clearBom() {
            if (!confirm('確定清空所有車種 BOM？')) return;
            bomData = { updatedAt: new Date().toLocaleString('zh-TW'), models: [] };
            localStorage.setItem('bomData', JSON.stringify(bomData));
            if (db) db.ref(BOM_PATH).set(bomData);
            currentModel = null; renderBom();
        }
        function bomTplInfo() { alert('匯入格式：\n1) 一張「彙整表」分頁：車種、料號\n2) 每個車種各一張分頁（分頁名＝車種），欄位含：層次、物件 ID、物件說明、元件數量、元件計量單位、物料類型\n\n可直接匯入 SAP 匯出的「各車種BOM」檔。'); }
        function selectModel(m) { currentModel = m; renderBom(); }
        function renderBom() {
            const models = bomModels();
            const totalRows = models.reduce((s,m)=>s+(m.rows||[]).length,0);
            document.getElementById('bomMeta').textContent = models.length ? `${models.length} 個車種・${totalRows} 筆元件` + (bomData.updatedAt?`・更新於 ${bomData.updatedAt}`:'') : '';
            document.getElementById('bomSidebar').innerHTML = models.map(m =>
                `<div class="bom-model ${m.name===currentModel?'active':''}" onclick="selectModel('${m.name.replace(/'/g,"\\'")}')">${esc(m.name)}<br><span class="cnt">${(m.rows||[]).length} 筆</span></div>`).join('');
            const content = document.getElementById('bomContent');
            if (!models.length) { content.innerHTML = '<div class="empty-hint">尚無車種BOM，點「📥 匯入車種BOM」</div>'; return; }
            if (!currentModel || !findModel(currentModel)) currentModel = models[0].name;
            const md = findModel(currentModel);
            const kw = (document.getElementById('bomSearch')?.value || '').trim().toLowerCase();
            let rows = md.rows || [];
            if (kw) rows = rows.filter(r => (r.mat + r.desc).toLowerCase().includes(kw));
            content.innerHTML =
                `<div class="bom-head">${esc(currentModel)}</div>
                 <div class="bom-sub">成品料號：${esc(md.part||'（未對應）')}　・　${(md.rows||[]).length} 筆元件</div>
                 <input class="search" id="bomSearch" placeholder="🔍 篩選料號或品名" value="${esc(kw)}" oninput="renderBom()">
                 <div class="table-wrap"><table class="data"><tr><th>層次</th><th>項目</th><th>料號</th><th>品名</th><th>用量</th><th>單位</th><th>類型</th></tr>` +
                rows.slice(0,500).map(r => `<tr><td><span class="lv">${esc(r.level)}</span></td><td>${esc(r.item)}</td><td>${esc(r.mat)}</td><td>${esc(r.desc)}</td><td>${esc(r.qty)}</td><td>${esc(r.unit)}</td><td>${esc(r.type)}</td></tr>`).join('') +
                (rows.length>500?`<tr><td colspan="7" style="color:#999">…其餘 ${rows.length-500} 筆（用搜尋縮小）</td></tr>`:'') + '</table></div>';
            const sb = document.getElementById('bomSearch');
            if (kw && sb) { sb.focus(); sb.setSelectionRange(sb.value.length, sb.value.length); }
        }

        initTabs();
        initData();
        initBom();
    </script>
</body>
</html>
