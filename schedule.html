<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排程工具</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 26px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .back-link {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 16px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        .import-btn, .tpl-btn {
            border: 1px solid #ccc;
            background: white;
            padding: 9px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: #555;
        }

        .filter-group {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .filter-btn {
            border: 1px solid #ccc;
            background: white;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            color: #555;
        }

        .filter-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .list {
            padding: 14px 20px 24px;
        }

        .empty-hint {
            text-align: center;
            color: #999;
            padding: 40px 10px;
            font-size: 15px;
        }

        .order-card {
            border: 1px solid #e5e5e5;
            border-left: 6px solid #28a745;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 18px;
            align-items: center;
        }

        .order-card.warn { border-left-color: #fd7e14; }
        .order-card.late { border-left-color: #dc3545; background: #fff5f5; }
        .order-card.done { border-left-color: #adb5bd; opacity: 0.6; }

        .order-main {
            flex: 1 1 200px;
            min-width: 180px;
        }

        .order-no {
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }

        .order-product {
            font-size: 14px;
            color: #666;
            margin-top: 2px;
        }

        .order-meta {
            font-size: 13px;
            color: #555;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 16px;
            flex: 2 1 300px;
        }

        .due-badge {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            color: white;
            background: #28a745;
            white-space: nowrap;
        }

        .due-badge.warn { background: #fd7e14; }
        .due-badge.late { background: #dc3545; }
        .due-badge.done { background: #adb5bd; }

        .order-actions {
            display: flex;
            gap: 6px;
        }

        .order-actions button {
            border: 1px solid #ccc;
            background: white;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 13px;
            cursor: pointer;
        }

        .order-note {
            width: 100%;
            font-size: 13px;
            color: #888;
        }

        /* 新增/編輯視窗 */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.show { display: flex; align-items: flex-start; justify-content: center; }

        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            margin-top: 40px;
        }

        .modal-box h3 {
            margin-bottom: 16px;
            color: #333;
        }

        .form-row {
            margin-bottom: 12px;
        }

        .form-row label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
        }

        .form-row input, .form-row select, .form-row textarea {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .modal-actions button {
            flex: 1;
            padding: 11px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }

        .save-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .cancel-btn {
            background: #eee;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a class="back-link" href="index.html">← 首頁</a>
            <h1>📅 排程工具</h1>
            <p>工單排程與交期追蹤・依交期自動排序・多裝置即時同步</p>
        </div>

        <div class="toolbar">
            <button class="add-btn" onclick="openModal()">＋ 新增工單</button>
            <button class="import-btn" onclick="document.getElementById('excelInput').click()">📥 匯入 Excel</button>
            <button class="tpl-btn" onclick="downloadTpl()">⬇️ 範本</button>
            <input type="file" id="excelInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcel(this.files[0]); this.value='';">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
                <button class="filter-btn" data-filter="open" onclick="setFilter('open')">進行中</button>
                <button class="filter-btn" data-filter="done" onclick="setFilter('done')">已完成</button>
            </div>
        </div>

        <div class="list" id="orderList"></div>
    </div>

    <div class="modal" id="orderModal">
        <div class="modal-box">
            <h3 id="modalTitle">新增工單</h3>
            <div class="form-row">
                <label>工單號 *</label>
                <input type="text" id="fOrderNo" placeholder="例如 WO-2026-001">
            </div>
            <div class="form-row">
                <label>成品料號（缺料分析展 BOM 用）</label>
                <input type="text" id="fMat" placeholder="例如 FG-1000">
            </div>
            <div class="form-row">
                <label>產品名稱</label>
                <input type="text" id="fProduct" placeholder="產品或品號">
            </div>
            <div class="form-row">
                <label>數量</label>
                <input type="number" id="fQty" placeholder="0">
            </div>
            <div class="form-row">
                <label>負責人 / 機台</label>
                <input type="text" id="fOwner" placeholder="例如 Stella / CNC-2">
            </div>
            <div class="form-row">
                <label>開始日期</label>
                <input type="date" id="fStart">
            </div>
            <div class="form-row">
                <label>交期 *</label>
                <input type="date" id="fDue">
            </div>
            <div class="form-row">
                <label>狀態</label>
                <select id="fStatus">
                    <option value="todo">未開始</option>
                    <option value="doing">進行中</option>
                    <option value="done">已完成</option>
                </select>
            </div>
            <div class="form-row">
                <label>備註</label>
                <textarea id="fNote" rows="2" placeholder="選填"></textarea>
            </div>
            <div class="modal-actions">
                <button class="save-btn" onclick="saveOrder()">儲存</button>
                <button class="cancel-btn" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        // 與生管看板共用同一個資料庫，但存在 toolbox/ 路徑下，互不影響
        const DATA_PATH = 'toolbox/schedule/orders';

        let orders = {};          // { id: {orderNo, mat, product, qty, owner, start, due, status, note} }
        let currentFilter = 'all';
        let editingId = null;

        function initData() {
            // 先載入本機快取，離線時也看得到資料
            orders = JSON.parse(localStorage.getItem('scheduleOrders') || '{}');
            render();

            if (db) {
                db.ref(DATA_PATH).on('value', snap => {
                    orders = snap.val() || {};
                    localStorage.setItem('scheduleOrders', JSON.stringify(orders));
                    render();
                });
            }
        }

        function persist() {
            localStorage.setItem('scheduleOrders', JSON.stringify(orders));
            if (db) db.ref(DATA_PATH).set(orders);
            render();
        }

        // 交期狀態：過期 late / 3 天內 warn / 其他 ok
        function dueState(o) {
            if (o.status === 'done') return 'done';
            if (!o.due) return 'ok';
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(o.due + 'T00:00:00');
            const days = Math.round((due - today) / 86400000);
            if (days < 0) return 'late';
            if (days <= 3) return 'warn';
            return 'ok';
        }

        function dueLabel(o) {
            if (o.status === 'done') return '已完成';
            if (!o.due) return '未設交期';
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(o.due + 'T00:00:00');
            const days = Math.round((due - today) / 86400000);
            if (days < 0) return `逾期 ${-days} 天`;
            if (days === 0) return '今天到期';
            return `還有 ${days} 天`;
        }

        const statusNames = { todo: '未開始', doing: '進行中', done: '已完成' };

        function render() {
            const list = document.getElementById('orderList');
            let items = Object.entries(orders).map(([id, o]) => ({ id, ...o }));

            if (currentFilter === 'open') items = items.filter(o => o.status !== 'done');
            if (currentFilter === 'done') items = items.filter(o => o.status === 'done');

            // 依交期由近到遠排序，沒交期的排最後
            items.sort((a, b) => (a.due || '9999') < (b.due || '9999') ? -1 : 1);

            if (items.length === 0) {
                list.innerHTML = '<div class="empty-hint">目前沒有工單，點上方「＋ 新增工單」開始排程</div>';
                return;
            }

            list.innerHTML = items.map(o => {
                const st = dueState(o);
                return `
                <div class="order-card ${st}">
                    <div class="order-main">
                        <div class="order-no">${esc(o.orderNo)}</div>
                        <div class="order-product">${o.mat ? esc(o.mat) + '｜' : ''}${esc(o.product || '')}${o.qty ? '・' + esc(o.qty) + ' pcs' : ''}</div>
                    </div>
                    <div class="order-meta">
                        <span>👤 ${esc(o.owner || '未指定')}</span>
                        <span>開始：${esc(o.start || '—')}</span>
                        <span>交期：${esc(o.due || '—')}</span>
                        <span>狀態：${statusNames[o.status] || '未開始'}</span>
                    </div>
                    <span class="due-badge ${st}">${dueLabel(o)}</span>
                    <div class="order-actions">
                        ${o.status !== 'done' ? `<button onclick="markDone('${o.id}')">✅ 完成</button>` : ''}
                        <button onclick="editOrder('${o.id}')">✏️ 編輯</button>
                        <button onclick="removeOrder('${o.id}')">🗑️</button>
                    </div>
                    ${o.note ? `<div class="order-note">📝 ${esc(o.note)}</div>` : ''}
                </div>`;
            }).join('');
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.filter === f));
            render();
        }

        function openModal(id) {
            editingId = id || null;
            document.getElementById('modalTitle').textContent = id ? '編輯工單' : '新增工單';
            const o = id ? orders[id] : {};
            document.getElementById('fOrderNo').value = o.orderNo || '';
            document.getElementById('fMat').value = o.mat || '';
            document.getElementById('fProduct').value = o.product || '';
            document.getElementById('fQty').value = o.qty || '';
            document.getElementById('fOwner').value = o.owner || '';
            document.getElementById('fStart').value = o.start || '';
            document.getElementById('fDue').value = o.due || '';
            document.getElementById('fStatus').value = o.status || 'todo';
            document.getElementById('fNote').value = o.note || '';
            document.getElementById('orderModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('show');
            editingId = null;
        }

        function saveOrder() {
            const orderNo = document.getElementById('fOrderNo').value.trim();
            const due = document.getElementById('fDue').value;
            if (!orderNo) { alert('請輸入工單號'); return; }
            if (!due) { alert('請選擇交期'); return; }

            const id = editingId || 'o' + Date.now();
            orders[id] = {
                orderNo,
                mat: document.getElementById('fMat').value.trim(),
                product: document.getElementById('fProduct').value.trim(),
                qty: document.getElementById('fQty').value,
                owner: document.getElementById('fOwner').value.trim(),
                start: document.getElementById('fStart').value,
                due,
                status: document.getElementById('fStatus').value,
                note: document.getElementById('fNote').value.trim()
            };
            closeModal();
            persist();
        }

        function editOrder(id) { openModal(id); }

        function markDone(id) {
            if (orders[id]) { orders[id].status = 'done'; persist(); }
        }

        function removeOrder(id) {
            if (confirm('確定要刪除這張工單嗎？')) {
                delete orders[id];
                persist();
            }
        }

        // Excel 一鍵匯入：以工單號比對，已存在就更新、沒有就新增
        function importExcel(file) {
            if (!file) return;
            readExcelFile(file, (err, rows) => {
                if (err) { alert('讀取 Excel 失敗：' + err.message); return; }
                if (!rows.length) { alert('檔案裡沒有資料'); return; }
                const map = buildHeaderMap(rows[0]);
                let added = 0, updated = 0, skipped = 0;
                const byNo = {};
                Object.entries(orders).forEach(([id, o]) => { if (o.orderNo) byNo[o.orderNo] = id; });
                rows.forEach((r, i) => {
                    const orderNo = String(cell(r, map, 'orderNo')).trim();
                    const due = parseDateCell(cell(r, map, 'dueDate'));
                    if (!orderNo || !due) { skipped++; return; }
                    const exists = byNo[orderNo];
                    const id = exists || ('o' + Date.now() + '_' + i);
                    const prev = orders[id] || {};
                    if (exists) updated++; else { added++; byNo[orderNo] = id; }
                    const mat = String(cell(r, map, 'mat') || cell(r, map, 'parent') || '').trim();
                    orders[id] = {
                        orderNo,
                        mat: mat || prev.mat || '',
                        product: String(cell(r, map, 'name')).trim() || prev.product || '',
                        qty: num(cell(r, map, 'qty')) || prev.qty || '',
                        owner: String(cell(r, map, 'owner')).trim() || prev.owner || '',
                        start: parseDateCell(cell(r, map, 'startDate')) || prev.start || '',
                        due,
                        status: prev.status || 'todo',
                        note: String(cell(r, map, 'note')).trim() || prev.note || ''
                    };
                });
                if (added + updated === 0) {
                    alert('沒有匯入任何資料。\n請確認標題列包含「工單號」與「交期」\n（可按「⬇️ 範本」下載格式參考）');
                    return;
                }
                persist();
                alert(`匯入完成：新增 ${added} 筆、更新 ${updated} 筆` + (skipped ? `、略過 ${skipped} 筆（缺工單號或交期）` : ''));
            });
        }

        function downloadTpl() {
            downloadTemplate('排程匯入範本.xlsx',
                ['工單號', '成品料號', '品名', '數量', '負責人', '開始日期', '交期', '備註'],
                ['WO-2026-001', 'FG-1000', '範例產品', 100, 'Stella', '2026-07-10', '2026-07-20', '']);
        }

        initData();
    </script>
</body>
</html>
